<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>

    <title>Bergamo Trails - Sentieri e Rifugi</title>

    <link href="/manifest.json" rel="manifest"/>
    <meta content="Mappa interattiva dei sentieri e rifugi di Bergamo" name="description"/>
    <meta content="#1a472a" name="theme-color"/>

    <meta content="yes" name="mobile-web-app-capable"/>
    <meta content="black-translucent" name="apple-mobile-web-app-status-bar-style"/>
    <meta content="Bergamo Trails" name="apple-mobile-web-app-title"/>

  <link rel="icon" href="/images/icons/icon-192x192.png" type="image/png" sizes="192x192">
  <link rel="icon" href="/images/icons/icon-512x512.png" type="image/png" sizes="512x512">
    <link href="/images/icons/icon-180x180.png" rel="apple-touch-icon"/>

    <link href="/favicon.png" rel="icon" type="image/png"/>
</head>

<body>
<script>
    // Prevent FOUC: apply theme before first paint
    (function () {
        var t = localStorage.getItem('cai-theme') || 'system';
        var dark = t === 'dark' || (t === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
    })();
</script>
<div id="app"></div>
<div id="splash-loading">
    <div class="splash-content">
        <img src="/images/icons/icon-192x192.png" alt="Bergamo Trails" width="48" height="48" style="border-radius:12px;">
        <h2>Bergamo Trails</h2>
        <p>Caricamento mappa sentieri...</p>
        <svg class="splash-spinner" xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
    </div>
</div>
<style>
    #splash-loading {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg-body, #f0f2f5);
        transition: opacity 0.3s;
    }
    [data-theme="dark"] #splash-loading {
        background: #0f172a;
        color: #e2e8f0;
    }
    .splash-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        color: #1a472a;
    }
    [data-theme="dark"] .splash-content {
        color: #a7f3d0;
    }
    .splash-content h2 {
        margin: 0;
        font-family: 'Inter', sans-serif;
        font-size: 1.4rem;
        font-weight: 700;
    }
    .splash-content p {
        margin: 0;
        font-family: 'Inter', sans-serif;
        font-size: 0.85rem;
        opacity: 0.7;
    }
    .splash-spinner {
        animation: splash-spin 1s linear infinite;
    }
    @keyframes splash-spin {
        to { transform: rotate(360deg); }
    }
    #splash-loading.hidden {
        opacity: 0;
        pointer-events: none;
    }
</style>
<script src="/src/main.js" type="module"></script>

<script>
    if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("/service-worker.js");
    }
</script>
</body>
</html>
