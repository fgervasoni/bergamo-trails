<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Bergamo Trails - Sentieri e Rifugi</title>

    <link rel="manifest" href="/manifest.json" />
    <meta name="description" content="Mappa interattiva dei sentieri e rifugi di Bergamo" />
    <meta name="theme-color" content="#1a472a" />

    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Bergamo Trails" />
    <link rel="apple-touch-icon" href="/images/icons/icon-152x152.png" />

    <link rel="icon" type="image/png" href="/favicon.png" />
  </head>

  <body>
    <script>
      // Prevent FOUC: apply theme before first paint
      (function() {
        var t = localStorage.getItem('cai-theme') || 'system';
        var dark = t === 'dark' || (t === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
      })();
    </script>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>

    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("/service-worker.js");
      }
    </script>
  </body>
</html>
