<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>

    <title>Bergamo Trails - Sentieri e Rifugi</title>

    <link href="/manifest.json" rel="manifest"/>
    <meta content="Mappa interattiva dei sentieri e rifugi di Bergamo" name="description"/>
    <meta content="#1a472a" name="theme-color"/>

    <meta content="yes" name="mobile-web-app-capable"/>
    <meta content="black-translucent" name="apple-mobile-web-app-status-bar-style"/>
    <meta content="Bergamo Trails" name="apple-mobile-web-app-title"/>

  <link rel="icon" href="/images/icons/icon-192x192.png" type="image/png" sizes="192x192">
  <link rel="icon" href="/images/icons/icon-512x512.png" type="image/png" sizes="512x512">
    <link href="/images/icons/icon-180x180.png" rel="apple-touch-icon"/>

    <link href="/favicon.png" rel="icon" type="image/png"/>
</head>

<body>
<script>
    // Prevent FOUC: apply theme before first paint
    (function () {
        var t = localStorage.getItem('cai-theme') || 'system';
        var dark = t === 'dark' || (t === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
    })();
</script>
<div id="app"></div>
<script src="/src/main.js" type="module"></script>

<script>
    if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("/service-worker.js");
    }
</script>
</body>
</html>
