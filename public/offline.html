<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Bergamo Trails — Offline</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1a472a">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a472a 0%, #2d6a4f 50%, #40916c 100%);
            color: white;
            text-align: center;
            padding: 24px;
        }
        .offline-card {
            max-width: 340px;
            width: 100%;
        }
        .offline-icon {
            margin-bottom: 20px;
            opacity: 0.9;
        }
        .offline-icon svg {
            width: 56px;
            height: 56px;
        }
        h1 {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        p {
            font-size: 0.92rem;
            opacity: 0.8;
            line-height: 1.5;
            margin-bottom: 24px;
        }
        .offline-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1.5px solid rgba(255,255,255,0.3);
            border-radius: 12px;
            color: white;
            font-size: 0.88rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.2s, transform 0.2s;
            text-decoration: none;
        }
        .offline-btn:hover {
            background: rgba(255,255,255,0.25);
            transform: translateY(-1px);
        }
        .offline-btn:active {
            transform: scale(0.97);
        }
    </style>
</head>
<body>
    <div class="offline-card">
        <div class="offline-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="m8 3 4 8 5-5 5 15H2L8 3z"/>
                <path d="M4.14 15.08c2.62-1.57 5.24-1.43 7.86.42 2.74 1.94 5.49 2 8.23.19"/>
            </svg>
        </div>
        <h1>Sei offline</h1>
        <p>Per utilizzare Bergamo Trails è necessaria una connessione internet. Controlla la tua connessione e riprova.</p>
        <button class="offline-btn" onclick="window.location.reload()">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 16h5v5"/></svg>
            Riprova
        </button>
    </div>
</body>
</html>
